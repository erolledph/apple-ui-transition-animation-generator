              <span class="slider-value">${(anim.duration/1000).toFixed(2)}s</span>
            </div>
            <input type="range" class="slider" id="durationSlider" min="100" max="2000" step="50" value="${anim.duration}" style="--p: ${(anim.duration/2000)*100}%">
          </div>
          <div class="slider-row">
            <div class="slider-header">
              <span class="slider-label">Delay</span>
              <span class="slider-value">${(anim.delay/1000).toFixed(2)}s</span>
            </div>
            <input type="range" class="slider" id="delaySlider" min="0" max="3000" step="50" value="${anim.delay}" style="--p: ${(anim.delay/3000)*100}%">
          </div>
          <div class="slider-row">
            <div class="slider-header">
              <span class="slider-label">Intensity</span>
              <span class="slider-value">${anim.intensity}%</span>
            </div>
            <input type="range" class="slider" id="intensitySlider" min="0" max="100" step="5" value="${anim.intensity}" style="--p: ${anim.intensity}%">
          </div>
        </div>
        <div class="inspector-section">
          <div class="inspector-section-title">Easing Curve</div>
          <div class="easing-grid">
            ${Object.entries(EASINGS).map(([key]) => `
              <button class="easing-btn ${anim.easing === key ? 'active' : ''}" data-easing="${key}">
                <svg class="easing-curve" viewBox="0 0 28 20">
                  <path d="${EASING_CURVES[key]}"/>
                </svg>
                <span class="easing-name">${key}</span>
              </button>
            `).join('')}
          </div>
        </div>
      `;

      content.querySelectorAll('.preset-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          const preset = PRESETS[btn.dataset.preset];
          anim.type = preset.type;
          anim.duration = preset.duration;
          anim.easing = preset.easing;
          renderAll(); renderTimeline();
        });
      });
      const durSlider = document.getElementById('durationSlider');
      durSlider.addEventListener('input', e => {
        anim.duration = +e.target.value;
        e.target.style.setProperty('--p', (anim.duration/2000)*100 + '%');
        renderInspector(); renderTimeline();
      });
      const delSlider = document.getElementById('delaySlider');
      delSlider.addEventListener('input', e => {
        anim.delay = +e.target.value;
        e.target.style.setProperty('--p', (anim.delay/3000)*100 + '%');
        renderInspector(); renderTimeline();
      });
      const intSlider = document.getElementById('intensitySlider');
      intSlider.addEventListener('input', e => {
        anim.intensity = +e.target.value;
        e.target.style.setProperty('--p', anim.intensity + '%');
        renderInspector();
      });
      content.querySelectorAll('.easing-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          anim.easing = btn.dataset.easing;
          renderInspector();
        });
      });
    }
  }

  // ========== RENDER: TIMELINE ==========
  function renderTimeline() {
    const ruler = document.getElementById('timelineRuler');
    const tracks = document.getElementById('timelineTracks');
    const totalSec = state.totalDuration / 1000;
    const rulerWidth = Math.max(100, ruler.offsetWidth);

    let rulerHtml = '';
    const step = 0.25;
    const numMarks = Math.ceil(totalSec / step);
    for (let i = 0; i <= numMarks; i++) {
      const sec = i * step;
      if (sec > totalSec + 0.01) break;
      const left = (sec / totalSec) * rulerWidth;
      const isMajor = i % 2 === 0;
      rulerHtml += `<div class="ruler-mark ${isMajor ? 'major' : ''}" style="left: ${left}px;">${isMajor ? sec.toFixed(1) + 's' : ''}</div>`;
    }
    ruler.innerHTML = rulerHtml;

    let tracksHtml = '<div class="playhead" id="playhead" style="left: 120px;"></div>';
    if (state.elements.length === 0) {
      tracksHtml += `<div style="padding-left: 130px; padding-top: 20px; color: var(--text-tertiary); font-size: 12px;">No animations. Add elements to see them here.</div>`;
    } else {
      state.elements.forEach(el => {
        const anim = el.animation;
        const left = (anim.delay / state.totalDuration) * rulerWidth;
        const width = Math.max(24, (anim.duration / state.totalDuration) * rulerWidth);
        const color = TYPE_COLORS[el.type];
        const presetName = Object.values(PRESETS).find(p => p.type === anim.type)?.name || anim.type;
        tracksHtml += `
          <div class="timeline-track">
            <div class="track-label">
              <div class="layer-icon" style="background: ${el.type === 'image' && el.src ? 'transparent' : color + '22'}; color: ${color};">
                ${el.type === 'image' && el.src ? `<img src="${el.src}" style="width:100%;height:100%;object-fit:cover;border-radius:4px;">` : getLayerIcon(el.type)}
              </div>
              <span>${el.name}</span>
            </div>
            <div class="track-area">
              <div class="track-bar" data-id="${el.id}" style="left: ${left}px; width: ${width}px; background: linear-gradient(90deg, ${color}, ${color}aa);">
                <span class="bar-label">${presetName}</span>
                <button class="delete-btn" data-id="${el.id}" title="Delete">
                  <svg width="9" height="9" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M18 6L6 18M6 6l12 12"/></svg>
                </button>
                <div class="trim-handle" data-id="${el.id}"></div>
              </div>
            </div>
          </div>
        `;
      });
    }
    tracks.innerHTML = tracksHtml;

    // Bar interactions
    tracks.querySelectorAll('.track-bar').forEach(bar => {
      const elId = bar.dataset.id;

      // Click to select
      bar.addEventListener('click', (e) => {
        if (e.target.closest('.delete-btn') || e.target.closest('.trim-handle')) return;
        if (!bar._hasMoved) {
          state.selectedId = elId;
          renderAll();
        }
      });

      // Delete button
      const delBtn = bar.querySelector('.delete-btn');
      delBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        deleteElement(elId);
      });

      // Drag to move delay
      bar.addEventListener('mousedown', (e) => {
        if (e.target.closest('.delete-btn') || e.target.closest('.trim-handle')) return;
        startBarDrag(e, elId, 'move');
      });

      // Trim handle
      const trimHandle = bar.querySelector('.trim-handle');
      trimHandle.addEventListener('mousedown', (e) => {
        e.stopPropagation();
        startBarDrag(e, elId, 'trim');
      });

      // Right-click
      bar.addEventListener('contextmenu', (e) => {
        e.preventDefault();
        e.stopPropagation();
        state.selectedId = elId;
        renderAll();
        showContextMenu(e.clientX, e.clientY, 'element');
      });
    });

    // Click track area to scrub
    tracks.addEventListener('mousedown', (e) => {
      if (e.target.classList.contains('timeline-tracks') || e.target.classList.contains('timeline-track') || e.target.classList.contains('track-area')) {
        const rect = tracks.getBoundingClientRect();
        const x = e.clientX - rect.left - 120;
        state.currentTime = Math.max(0, Math.min(state.totalDuration, (x / rulerWidth) * state.totalDuration));
        updatePlayhead();
      }
    });

    updatePlayhead();
  }

  function startBarDrag(e, elId, mode) {
    e.preventDefault();
    const el = state.elements.find(x => x.id === elId);
    if (!el) return;
    const startX = e.clientX;
    const startDelay = el.animation.delay;
    const startDuration = el.animation.duration;
    const ruler = document.getElementById('timelineRuler');
    const rulerWidth = Math.max(100, ruler.offsetWidth);
    const msPerPx = state.totalDuration / rulerWidth;
    const bar = document.querySelector(`.track-bar[data-id="${elId}"]`);
    bar.classList.add('dragging');
    bar._hasMoved = false;

    function onMove(e) {
      const dx = e.clientX - startX;
      if (Math.abs(dx) > 3) bar._hasMoved = true;
      const dMs = dx * msPerPx;

      if (mode === 'move') {
        let newDelay = startDelay + dMs;
        newDelay = Math.max(0, Math.min(state.totalDuration - el.animation.duration, newDelay));
        el.animation.delay = Math.round(newDelay);
      } else if (mode === 'trim') {
        let newDuration = startDuration + dMs;
        newDuration = Math.max(100, Math.min(state.totalDuration - el.animation.delay, newDuration));
        el.animation.duration = Math.round(newDuration);
      }

      // Update bar position live
      const left = (el.animation.delay / state.totalDuration) * rulerWidth;
      const width = Math.max(24, (el.animation.duration / state.totalDuration) * rulerWidth);
      bar.style.left = left + 'px';
      bar.style.width = width + 'px';

      // Update inspector if open
      const durSlider = document.getElementById('durationSlider');
      const delSlider = document.getElementById('delaySlider');
      if (durSlider) {
        durSlider.value = el.animation.duration;
        durSlider.style.setProperty('--p', (el.animation.duration/2000)*100 + '%');
        const val = durSlider.parentElement.querySelector('.slider-value');
        if (val) val.textContent = (el.animation.duration/1000).toFixed(2) + 's';
      }
      if (delSlider) {
        delSlider.value = el.animation.delay;
        delSlider.style.setProperty('--p', (el.animation.delay/3000)*100 + '%');
        const val = delSlider.parentElement.querySelector('.slider-value');
        if (val) val.textContent = (el.animation.delay/1000).toFixed(2) + 's';
      }
    }
    function onUp() {
      bar.classList.remove('dragging');
      document.removeEventListener('mousemove', onMove);
      document.removeEventListener('mouseup', onUp);
      setTimeout(() => { bar._hasMoved = false; }, 50);
      renderTimeline();
    }
    document.addEventListener('mousemove', onMove);
    document.addEventListener('mouseup', onUp);
  }

  function updatePlayhead() {
    const ruler = document.getElementById('timelineRuler');
    const playhead = document.getElementById('playhead');
    const rulerWidth = Math.max(100, ruler.offsetWidth);
    if (playhead) {
      playhead.style.left = (120 + (state.currentTime / state.totalDuration) * rulerWidth) + 'px';
    }
    document.getElementById('currentTime').textContent = (state.currentTime / 1000).toFixed(2) + 's';
  }

  // ========== RENDER ALL ==========
  function renderAll() {
    renderLayers();
    renderCanvas();
    renderInspector();
  }

  // ========== ELEMENT OPERATIONS ==========
  function addElement(type) {
    const names = { card: 'Card', text: 'Text', button: 'Button', circle: 'Avatar', image: 'Image' };
    const counts = state.elements.filter(e => e.type === type).length + 1;
    const defaultSizes = {
      card:   { w: 200, h: 100 },
      text:   { w: 200, h: 30 },
      button: { w: 200, h: 48 },
      circle: { w: 60,  h: 60 },
      image:  { w: 120, h: 120 }
    };
    const size = defaultSizes[type];
    const el = {
      id: nextId(),
      type,
      name: `${names[type]} ${counts}`,
      x: 80 + Math.random() * 40,
      y: 100 + state.elements.length * 60,
      width: size.w,
      height: size.h,
      color: type === 'text' ? '#ffffff' : TYPE_COLORS[type],
      text: type === 'text' ? 'New Text' : type === 'button' ? 'Tap Me' : '',
      opacity: 100,
      borderRadius: type === 'card' ? 16 : type === 'button' ? 14 : type === 'image' ? 12 : 0,
      rotation: 0,
      shadow: type !== 'text',
      src: null,
      animation: {
        type: 'fade-in',
        duration: 500,
        delay: Math.min(state.elements.length * 100, 1500),
        easing: 'ease-out',
        intensity: 50
      }
    };
    state.elements.push(el);
    state.selectedId = el.id;
    renderAll(); renderTimeline();
  }

  function deleteElement(id) {
    const idx = state.elements.findIndex(e => e.id === id);
    if (idx === -1) return;
    state.elements.splice(idx, 1);
    if (state.selectedId === id) state.selectedId = null;
    renderAll(); renderTimeline();
    showToast('Element deleted', '#ff453a');
  }

  function duplicateElement(id) {
    const el = state.elements.find(e => e.id === id);
    if (!el) return;
    const copy = JSON.parse(JSON.stringify(el));
    copy.id = nextId();
    copy.name = el.name + ' Copy';
    copy.x = el.x + 20;
    copy.y = el.y + 20;
    copy.animation = { ...el.animation, delay: el.animation.delay + 100 };
    const idx = state.elements.findIndex(e => e.id === id);
    state.elements.splice(idx + 1, 0, copy);
    state.selectedId = copy.id;
    renderAll(); renderTimeline();
    showToast('Element duplicated');
  }

  // ========== IMAGE UPLOAD ==========
  function handleImageUpload(files) {
    Array.from(files).forEach(file => {
      if (!file.type.startsWith('image/')) return;
      const reader = new FileReader();
      reader.onload = (e) => {
        const img = new Image();
        img.onload = () => {
          const maxSize = 200;
          let w = img.naturalWidth, h = img.naturalHeight;
          if (w > maxSize || h > maxSize) {
            const ratio = Math.min(maxSize / w, maxSize / h);
            w = Math.round(w * ratio);
            h = Math.round(h * ratio);
          }
          const counts = state.elements.filter(e => e.type === 'image').length + 1;
          const el = {
            id: nextId(),
            type: 'image',
            name: file.name.replace(/\.[^.]+$/, '').substring(0, 20) || `Image ${counts}`,
            x: 80 + Math.random() * 40,
            y: 100 + state.elements.length * 60,
            width: w,
            height: h,
            color: '#ffffff',
            text: '',
            opacity: 100,
            borderRadius: 12,
            rotation: 0,
            shadow: true,
            src: e.target.result,
            animation: {
              type: 'scale-in',
              duration: 500,
              delay: Math.min(state.elements.length * 100, 1500),
              easing: 'spring',
              intensity: 50
            }
          };
          state.elements.push(el);
          state.selectedId = el.id;
          renderAll(); renderTimeline();
        };
        img.src = e.target.result;
      };
      reader.readAsDataURL(file);
    });
    showToast(`${files.length} image${files.length > 1 ? 's' : ''} uploaded`);
  }

  // ========== PLAYBACK ==========
  function togglePlay() {
    if (state.isPlaying) stopPlayback();
    else play();
  }

  function play() {
    if (state.elements.length === 0) {
      showToast('Add elements first', '#ff9f0a');
      return;
    }
    state.isPlaying = true;
    state.currentTime = 0;
    state.playStartTime = performance.now();
    applyInitialStates();
    requestAnimationFrame(() => {
      triggerAnimations();
      animatePlayhead();
    });
    const btn = document.getElementById('playBtn');
    btn.classList.add('playing');
    btn.innerHTML = '<svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="5" width="4" height="14" rx="1"/><rect x="14" y="5" width="4" height="14" rx="1"/></svg>';
  }

  function stopPlayback() {
    state.isPlaying = false;
    if (state.animationFrame) cancelAnimationFrame(state.animationFrame);
    const btn = document.getElementById('playBtn');
    btn.classList.remove('playing');
    btn.innerHTML = '<svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>';
    // Reset elements to final state
    state.elements.forEach(el => {
      const dom = document.querySelector(`.canvas-element[data-id="${el.id}"]`);
      if (dom) {
        dom.style.transition = 'all 0.3s cubic-bezier(0.4, 0, 0.2, 1)';
        dom.style.opacity = el.opacity / 100;
        dom.style.transform = `rotate(${el.rotation}deg)`;
        dom.style.filter = 'none';
      }
    });
  }

  function applyInitialStates() {
    state.elements.forEach(el => {
      const dom = document.querySelector(`.canvas-element[data-id="${el.id}"]`);
      if (!dom) return;
      const anim = el.animation;
      const intensity = anim.intensity / 100;
      dom.style.transition = 'none';
      const baseTransform = `translate(0, 0) scale(1) rotate(${el.rotation}deg)`;

      switch(anim.type) {
        case 'fade-in':
          dom.style.opacity = '0';
          dom.style.transform = baseTransform;
          dom.style.filter = 'none';
          break;
        case 'slide-up':
          dom.style.opacity = '0';
          dom.style.transform = `translateY(${60 * intensity}px) rotate(${el.rotation}deg)`;
          dom.style.filter = 'none';
          break;
        case 'slide-down':
          dom.style.opacity = '0';
          dom.style.transform = `translateY(${-60 * intensity}px) rotate(${el.rotation}deg)`;
          dom.style.filter = 'none';
          break;
        case 'slide-left':
          dom.style.opacity = '0';
          dom.style.transform = `translateX(${80 * intensity}px) rotate(${el.rotation}deg)`;
          dom.style.filter = 'none';
          break;
        case 'slide-right':
          dom.style.opacity = '0';
          dom.style.transform = `translateX(${-80 * intensity}px) rotate(${el.rotation}deg)`;
          dom.style.filter = 'none';
          break;
        case 'scale-in':
          dom.style.opacity = '0';
          dom.style.transform = `scale(${Math.max(0.1, 1 - 0.6 * intensity)}) rotate(${el.rotation}deg)`;
          dom.style.filter = 'none';
          break;
        case 'spring-pop':
          dom.style.opacity = '0';
          dom.style.transform = `scale(${Math.max(0.1, 1 - 0.8 * intensity)}) rotate(${el.rotation}deg)`;
          dom.style.filter = 'none';
          break;
        case 'blur-in':
          dom.style.opacity = '0';
          dom.style.transform = baseTransform;
          dom.style.filter = `blur(${12 * intensity}px)`;
          break;
        case 'rotate-in':
          dom.style.opacity = '0';
          dom.style.transform = `scale(${Math.max(0.1, 1 - 0.4 * intensity)}) rotate(${360 * intensity + el.rotation}deg)`;
          dom.style.filter = 'none';
          break;
        case 'flip-in':
          dom.style.opacity = '0';
          dom.style.transform = `perspective(800px) rotateX(${90 * intensity}deg)`;
          dom.style.filter = 'none';
          break;
      }
      void dom.offsetHeight;
    });
  }

  function triggerAnimations() {
    state.elements.forEach(el => {
      const dom = document.querySelector(`.canvas-element[data-id="${el.id}"]`);
      if (!dom) return;
      const anim = el.animation;
      const easing = EASINGS[anim.easing] || 'ease';
      dom.style.transition = `all ${anim.duration}ms ${easing} ${anim.delay}ms`;
      dom.style.opacity = el.opacity / 100;
      dom.style.transform = `rotate(${el.rotation}deg)`;
      dom.style.filter = 'none';
    });
  }

  function animatePlayhead() {
    if (!state.isPlaying) return;
    const elapsed = performance.now() - state.playStartTime;
    state.currentTime = Math.min(elapsed, state.totalDuration);
    updatePlayhead();
    if (elapsed >= state.totalDuration + 100) {
      setTimeout(() => stopPlayback(), 200);
      return;
    }
    state.animationFrame = requestAnimationFrame(animatePlayhead);
  }

  function restart() {
    stopPlayback();
    state.currentTime = 0;
    updatePlayhead();
    setTimeout(() => play(), 100);
  }

  // ========== CONTEXT MENU ==========
  function showContextMenu(x, y, type) {
    const menu = document.getElementById('contextMenu');
    let items = [];
    if (type === 'element' && state.selectedId) {
      items = [
        { label: 'Duplicate', shortcut: '⌘D', action: () => duplicateElement(state.selectedId) },
        { label: 'Bring Forward', action: () => bringForward(state.selectedId) },
        { label: 'Send Backward', action: () => sendBackward(state.selectedId) },
        { divider: true },
        { label: 'Delete', shortcut: '⌫', danger: true, action: () => deleteElement(state.selectedId) }
      ];
    }
    menu.innerHTML = items.map(item => {
      if (item.divider) return '<div class="ctx-divider"></div>';
      return `<div class="ctx-item ${item.danger ? 'danger' : ''}" data-action="${item.label}">
        <span>${item.label}</span>
        ${item.shortcut ? `<span style="margin-left:auto;color:var(--text-tertiary);font-size:10px;">${item.shortcut}</span>` : ''}
      </div>`;
    }).join('');
    menu.style.left = x + 'px';
    menu.style.top = y + 'px';
    menu.classList.add('show');

    menu.querySelectorAll('.ctx-item').forEach((item, i) => {
      const itemData = items.filter(it => !it.divider)[i];
      if (itemData) {
        item.addEventListener('click', () => {
          itemData.action();
          hideContextMenu();
        });
      }
    });
  }

  function hideContextMenu() {
    document.getElementById('contextMenu').classList.remove('show');
  }

  function bringForward(id) {
    const idx = state.elements.findIndex(e => e.id === id);
    if (idx < state.elements.length - 1) {
      [state.elements[idx], state.elements[idx+1]] = [state.elements[idx+1], state.elements[idx]];
      renderAll(); renderTimeline();
    }
  }

  function sendBackward(id) {
    const idx = state.elements.findIndex(e => e.id === id);
    if (idx > 0) {
      [state.elements[idx], state.elements[idx-1]] = [state.elements[idx-1], state.elements[idx]];
      renderAll(); renderTimeline();
    }
  }

  // ========== EXPORT ==========
  function exportHTML() {
    if (state.elements.length === 0) {
      showToast('Nothing to export', '#ff9f0a');
      return;
    }

    const bgCSS = state.scene.bgType === 'gradient'
      ? `linear-gradient(${state.scene.bgAngle}deg, ${state.scene.bgColor0}, ${state.scene.bgColor1})`
      : state.scene.bgColor0;

    let elementsCSS = '';
    let keyframes = '';
    let elementsHTML = '';

    state.elements.forEach(el => {
      const anim = el.animation;
      const intensity = anim.intensity / 100;
      const easing = EASINGS[anim.easing] || 'ease';
      const className = 'el-' + el.id;
      const animName = 'anim-' + el.id;
      const baseTransform = el.rotation ? `rotate(${el.rotation}deg)` : 'none';

      // Element CSS
      let elStyles = `
  position: absolute;
  left: ${el.x}px;
  top: ${el.y}px;
  width: ${el.width}px;
  height: ${el.height}px;
  opacity: ${el.opacity / 100};`;

      if (el.type === 'card') {
        elStyles += `
  background: linear-gradient(135deg, ${el.color}, ${darkenColor(el.color, 0.4)});
  border-radius: ${el.borderRadius}px;
  border: 1px solid rgba(255,255,255,0.06);`;
        if (el.shadow) elStyles += `\n  box-shadow: 0 8px 24px rgba(0,0,0,0.3);`;
      } else if (el.type === 'circle') {
        elStyles += `
  background: linear-gradient(135deg, ${el.color}, ${darkenColor(el.color, 0.5)});
  border-radius: 50%;`;
        if (el.shadow) elStyles += `\n  box-shadow: 0 6px 20px rgba(0,0,0,0.4);`;
      } else if (el.type === 'button') {
        elStyles += `
  background: ${el.color};
  border-radius: ${el.borderRadius}px;
  color: white;
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 600;
  font-size: 15px;
  font-family: -apple-system, sans-serif;`;
        if (el.shadow) elStyles += `\n  box-shadow: 0 6px 16px ${el.color}59;`;
      } else if (el.type === 'text') {
        elStyles += `
  color: ${el.color};
  font-size: ${Math.min(el.height * 0.75, 26)}px;
  font-weight: 700;
  font-family: -apple-system, sans-serif;
  letter-spacing: -0.03em;
  display: flex;
  align-items: center;
  padding-left: 4px;`;
      } else if (el.type === 'image') {
        elStyles += `
  border-radius: ${el.borderRadius}px;
  overflow: hidden;`;
        if (el.shadow) elStyles += `\n  box-shadow: 0 8px 24px rgba(0,0,0,0.3);`;
      }

      elementsCSS += `.${className} {${elStyles}\n  animation: ${animName} ${(anim.duration/1000).toFixed(2)}s ${easing} ${(anim.delay/1000).toFixed(2)}s both;\n}\n\n`;

      // Keyframes
      let fromState = '', toState = '';
      switch(anim.type) {
        case 'fade-in':
          fromState = `opacity: 0; transform: ${baseTransform};`;
          toState = `opacity: ${el.opacity/100}; transform: ${baseTransform};`;
          break;
        case 'slide-up':
          fromState = `opacity: 0; transform: translateY(${(60*intensity).toFixed(0)}px) ${baseTransform};`;
          toState = `opacity: ${el.opacity/100}; transform: translateY(0) ${baseTransform};`;
          break;
        case 'slide-down':
          fromState = `opacity: 0; transform: translateY(${(-60*intensity).toFixed(0)}px) ${baseTransform};`;
          toState = `opacity: ${el.opacity/100}; transform: translateY(0) ${baseTransform};`;
          break;
        case 'slide-left':
          fromState = `opacity: 0; transform: translateX(${(80*intensity).toFixed(0)}px) ${baseTransform};`;
          toState = `opacity: ${el.opacity/100}; transform: translateX(0) ${baseTransform};`;
          break;
        case 'slide-right':
          fromState = `opacity: 0; transform: translateX(${(-80*intensity).toFixed(0)}px) ${baseTransform};`;
          toState = `opacity: ${el.opacity/100}; transform: translateX(0) ${baseTransform};`;
          break;
        case 'scale-in':
          fromState = `opacity: 0; transform: scale(${(1-0.6*intensity).toFixed(2)}) ${baseTransform};`;
          toState = `opacity: ${el.opacity/100}; transform: scale(1) ${baseTransform};`;
          break;
        case 'spring-pop':
          fromState = `opacity: 0; transform: scale(${(1-0.8*intensity).toFixed(2)}) ${baseTransform};`;
          toState = `opacity: ${el.opacity/100}; transform: scale(1) ${baseTransform};`;
          break;
        case 'blur-in':
          fromState = `opacity: 0; filter: blur(${(12*intensity).toFixed(0)}px); transform: ${baseTransform};`;
          toState = `opacity: ${el.opacity/100}; filter: blur(0); transform: ${baseTransform};`;
          break;
        case 'rotate-in':
          fromState = `opacity: 0; transform: scale(${(1-0.4*intensity).toFixed(2)}) rotate(${(360*intensity + el.rotation).toFixed(0)}deg);`;
          toState = `opacity: ${el.opacity/100}; transform: scale(1) rotate(${el.rotation}deg);`;
          break;
        case 'flip-in':
          fromState = `opacity: 0; transform: perspective(800px) rotateX(${(90*intensity).toFixed(0)}deg);`;
          toState = `opacity: ${el.opacity/100}; transform: perspective(800px) rotateX(0);`;
          break;
      }
      keyframes += `@keyframes ${animName} {\n  from { ${fromState} }\n  to   { ${toState} }\n}\n\n`;

      // Element HTML
      let innerContent = '';
      if (el.type === 'text') innerContent = el.text || 'Text';
      else if (el.type === 'button') innerContent = el.text || 'Button';
      else if (el.type === 'image' && el.src) innerContent = `<img src="${el.src}" style="width:100%;height:100%;object-fit:cover;">`;

      elementsHTML += `    <div class="${className}">${innerContent}</div>\n`;
    });

    const html = `<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Transition Studio Export</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #0a0a0c;
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
    padding: 40px;
  }
  .stage {
    width: 360px;
    height: 640px;
    background: ${bgCSS};
    border-radius: 36px;
    position: relative;
    overflow: hidden;
    box-shadow: 0 0 0 1px rgba(255,255,255,0.06), 0 30px 80px rgba(0,0,0,0.6);
  }
 ${elementsCSS}
 ${keyframes}
  .replay-btn {
    position: fixed;
    top: 20px;
    right: 20px;
    background: #0a84ff;
    color: white;
    border: none;
    padding: 10px 20px;
    border-radius: 10px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    font-family: inherit;
    transition: all 0.2s ease;
    box-shadow: 0 4px 12px rgba(10,132,255,0.4);
  }
  .replay-btn:hover { background: #409cff; transform: translateY(-1px); }
  .replay-btn:active { transform: translateY(0); }
</style>
</head>
<body>
  <button class="replay-btn" onclick="replay()">Replay Animation</button>
  <div class="stage">
 ${elementsHTML}  </div>
<script>
    function replay() {
      const els = document.querySelectorAll('.stage > div');
      els.forEach(el => {
        el.style.animation = 'none';
        void el.offsetWidth;
        el.style.animation = '';
      });
    }
    // Auto-replay on load
    window.addEventListener('load', () => {
      setTimeout(replay, 100);
    });
  <\/script>
</body>
</html>`;

    // Syntax highlight
    const highlighted = html
      .replace(/(&lt;\/?)(html|head|body|style|script|meta|title|div|button|img)/g, '$1<span class="kw">$2</span>')
      .replace(/(&lt;)/g, '&lt;')
      .replace(/(<)/g, '&lt;')
      .replace(/(&lt;\/?)(html|head|body|style|script|meta|title|div|button|img)/g, '$1<span class="kw">$2</span>')
      .replace(/([a-z-]+)(=)("[^"]*")/g, '<span class="prop">$1</span>$2<span class="str">$3</span>')
      .replace(/(\/\/[^\n]*)/g, '<span class="com">$1</span>')
      .replace(/(\.[a-z][a-z0-9-]+)/g, '<span class="sel">$1</span>')
      .replace(/(@keyframes|from|to|@media)/g, '<span class="kw">$1</span>')
      .replace(/([a-z-]+)(?=:)/g, '<span class="prop">$1</span>')
      .replace(/(\d+\.?\d*(?:px|s|deg|%|ms)?)/g, '<span class="num">$1</span>');

    document.getElementById('exportCode').innerHTML = highlighted;
    document.getElementById('exportModal').classList.add('active');
    state._exportedHTML = html;
  }

  // ========== TOAST ==========
  function showToast(msg, color = '#30d158') {
    const toast = document.getElementById('toast');
    toast.innerHTML = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="${color}" stroke-width="2.5"><path d="M20 6L9 17l-5-5"/></svg> ${msg}`;
    toast.classList.add('show');
    clearTimeout(toast._timer);
    toast._timer = setTimeout(() => toast.classList.remove('show'), 2200);
  }

  // ========== INIT ==========
  function init() {
    createDefaultElements();
    state.selectedId = state.elements[2].id;
    renderScene();
    renderAll();
    requestAnimationFrame(() => renderTimeline());

    // Tabs
    document.querySelectorAll('.tab-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        state.activeTab = btn.dataset.tab;
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b === btn));
        renderInspector();
      });
    });

    // Add buttons
    document.querySelectorAll('.add-btn').forEach(btn => {
      if (btn.id === 'uploadBtn') {
        btn.addEventListener('click', () => document.getElementById('fileInput').click());
      } else {
        btn.addEventListener('click', () => addElement(btn.dataset.type));
      }
    });

    // File upload
    document.getElementById('fileInput').addEventListener('change', (e) => {
      handleImageUpload(e.target.files);
      e.target.value = '';
    });

    // Playback
    document.getElementById('playBtn').addEventListener('click', togglePlay);
    document.getElementById('restartBtn').addEventListener('click', restart);

    // Export
    document.getElementById('exportBtn').addEventListener('click', exportHTML);
    document.getElementById('closeExport').addEventListener('click', () => {
      document.getElementById('exportModal').classList.remove('active');
    });
    document.getElementById('exportModal').addEventListener('click', (e) => {
      if (e.target.id === 'exportModal') {
        document.getElementById('exportModal').classList.remove('active');
      }
    });
    document.getElementById('copyCode').addEventListener('click', () => {
      navigator.clipboard.writeText(state._exportedHTML).then(() => showToast('HTML copied to clipboard'));
    });
    document.getElementById('downloadCode').addEventListener('click', () => {
      const blob = new Blob([state._exportedHTML], { type: 'text/html' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'output.html';
      a.click();
      URL.revokeObjectURL(url);
      showToast('output.html downloaded');
    });

    // Clear
    document.getElementById('clearBtn').addEventListener('click', () => {
      if (state.elements.length === 0) return;
      stopPlayback();
      state.elements = [];
      state.selectedId = null;
      renderAll(); renderTimeline();
      showToast('Canvas cleared', '#ff453a');
    });

    // Reset
    document.getElementById('resetBtn').addEventListener('click', () => {
      stopPlayback();
      idCounter = 1;
      createDefaultElements();
      state.selectedId = state.elements[2].id;
      renderAll(); renderTimeline();
      showToast('Demo scene restored');
    });

    // Duplicate & Delete toolbar
    document.getElementById('duplicateBtn').addEventListener('click', () => {
      if (state.selectedId) duplicateElement(state.selectedId);
    });
    document.getElementById('deleteBtn').addEventListener('click', () => {
      if (state.selectedId) deleteElement(state.selectedId);
    });

    // Snap toggle
    document.getElementById('snapBtn').addEventListener('click', (e) => {
      state.snapEnabled = !state.snapEnabled;
      e.currentTarget.classList.toggle('active', state.snapEnabled);
      showToast(`Snap to grid ${state.snapEnabled ? 'enabled' : 'disabled'}`);
    });

    // Total duration slider
    const tdSlider = document.getElementById('totalDurationSlider');
    tdSlider.style.setProperty('--p', ((state.totalDuration - 1000) / 5000) * 100 + '%');
    tdSlider.addEventListener('input', e => {
      state.totalDuration = +e.target.value;
      const p = ((state.totalDuration - 1000) / 5000) * 100;
      e.target.style.setProperty('--p', p + '%');
      document.getElementById('totalDurationLabel').textContent = (state.totalDuration/1000).toFixed(1) + 's';
      document.getElementById('totalTime').textContent = (state.totalDuration/1000).toFixed(2) + 's';
      renderTimeline();
    });

    // Scene background controls
    document.querySelectorAll('#bgTypeToggle button').forEach(btn => {
      btn.addEventListener('click', () => {
        state.scene.bgType = btn.dataset.type;
        renderScene();
      });
    });

    // Color swatches for scene
    document.querySelectorAll('.scene-color-swatch').forEach(swatch => {
      swatch.addEventListener('click', () => {
        const stop = swatch.dataset.stop;
        const input = document.createElement('input');
        input.type = 'color';
        input.value = state.scene['bgColor' + stop];
        input.addEventListener('input', e => {
          state.scene['bgColor' + stop] = e.target.value;
          renderScene();
        });
        input.click();
      });
    });

    // Click empty canvas to deselect
    document.getElementById('canvasStage').addEventListener('mousedown', (e) => {
      if (e.target.id === 'canvasStage' || e.target.classList.contains('phone-status-bar') || e.target.classList.contains('phone-home-indicator')) {
        state.selectedId = null;
        renderAll();
      }
    });

    // Keyboard shortcuts
    document.addEventListener('keydown', (e) => {
      if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
      if (e.code === 'Space') {
        e.preventDefault(); togglePlay();
      } else if (e.code === 'KeyR') {
        restart();
      } else if (e.code === 'Escape') {
        document.getElementById('exportModal').classList.remove('active');
        hideContextMenu();
        state.selectedId = null;
        renderAll();
      } else if (e.code === 'Delete' || e.code === 'Backspace') {
        if (state.selectedId) {
          e.preventDefault();
          deleteElement(state.selectedId);
        }
      } else if ((e.metaKey || e.ctrlKey) && e.code === 'KeyD') {
        e.preventDefault();
        if (state.selectedId) duplicateElement(state.selectedId);
      }
    });

    // Context menu dismiss
    document.addEventListener('click', (e) => {
      if (!e.target.closest('.context-menu')) hideContextMenu();
    });
    document.addEventListener('contextmenu', (e) => {
      if (!e.target.closest('.canvas-element') && !e.target.closest('.track-bar')) {
        hideContextMenu();
      }
    });

    // Initial time display
    document.getElementById('totalTime').textContent = (state.totalDuration/1000).toFixed(2) + 's';

    // Resize handler
    let resizeTimer;
    window.addEventListener('resize', () => {
      clearTimeout(resizeTimer);
      resizeTimer = setTimeout(() => renderTimeline(), 100);
    });
  }

  init();
</script>
</body>
</html>
